<!DOCTYPE html>
<html lang="en-us">

  {{ partial "head.html" . }}

  <body>
    <div class="site-wrap">
      {{ partial "header.html" . }}

      <div class="content container">
        {{ block "main" . }}{{ end }}
      </div>
    </div>

    {{ partial "custom_footer.html" . }}
    {{ range .Site.Params.plugins_js }}
      <script src="{{ . }}"></script>
    {{ end }}
  </body>
</html>
