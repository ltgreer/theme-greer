<div class="sidebar">
  <div class="container sidebar-sticky">
    <div class="sidebar-about h-card">
      <a href="/" class="sidebar-brand">
        <img src="{{ "ltg.svg" | relURL }}" alt="{{ .Site.Title }}" class="sidebar-logo-img" />
        <h1 class="sidebar-title"><span class="p-name">{{ .Site.Title }}</span></h1>
      </a>
      <p class="lead">{{ .Site.Params.description | safeHTML }}</p>
    </div>

    <nav class="sidebar-nav">

		{{ with .Site.Menus.main }}{{ range . }}
			{{ if .Page.Params.redirect_url }}
				<a class="sidebar-nav-item" href="{{ .Page.Params.redirect_url }}">{{ .Name }}</a>
			{{ else }}
				<a class="sidebar-nav-item" href="{{ .URL | relLangURL | safeURL }}">{{ .Name }}</a>
			{{ end }}
		{{ end }}{{ end }}

    </nav>
  </div>
</div>
