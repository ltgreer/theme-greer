{{ if gt .Paginator.TotalPages 1 }}
<nav class="pagination" role="navigation">
  {{ if .Paginator.HasPrev }}
    <a class="pagination-prev" href="{{ .Paginator.Prev.URL }}">&larr; Newer</a>
  {{ end }}
  {{ if .Paginator.HasNext }}
    <a class="pagination-next" href="{{ .Paginator.Next.URL }}">Older &rarr;</a>
  {{ end }}
</nav>
{{ end }}
