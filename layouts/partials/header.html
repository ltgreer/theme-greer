<header class="site-header" role="banner">
  <div class="header-inner">
    <div class="site-identity h-card">
      {{ with $.Site.Params.author_avatar }}
        <img src="{{ . }}" alt="{{ $.Site.Title }}" class="site-avatar u-photo" />
      {{ end }}
      <a href="{{ $.Site.BaseURL }}" class="site-title u-url p-name" rel="me">{{ $.Site.Title }}</a>
      {{ with $.Site.Params.site_tagline }}
        <p class="site-tagline p-note">{{ . }}</p>
      {{ end }}
    </div>

    {{ if len $.Site.Menus.main }}
      <nav class="site-nav" role="navigation">
        <ul>
          {{ range $.Site.Menus.main }}
            <li><a href="{{ .URL }}">{{ .Name }}</a></li>
          {{ end }}
        </ul>
      </nav>
    {{ end }}
  </div>
</header>
